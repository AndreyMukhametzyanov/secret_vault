    privacy:
      meta_title: "Политика конфиденциальности — Секретница"
      title: "Политика конфиденциальности"
      last_updated: "26 июня 2026 г."
      sections:
        - heading: "1. Кто мы"
          body: |
            Сервис «Секретница» (далее — Сервис) предназначен для безопасного обмена конфиденциальными данными по одноразовым ссылкам.
            По всем вопросам, связанным с обработкой данных, вы можете связаться с нами по электронной почте: <a href="mailto:privacy@secretvault.ru">privacy@secretvault.ru</a>.
        - heading: "2. Какие данные мы обрабатываем"
          body: |
            <strong>При создании секрета (без регистрации):</strong>
            <ul>
              <li>IP-адрес отправителя — используется для защиты от злоупотреблений и ограничения частоты запросов.</li>
              <li>Содержимое секрета (зашифрованное), опционально — кодовое слово (хранится в виде bcrypt-хэша).</li>
            </ul>
            <strong>При открытии секрета:</strong>
            <ul>
              <li>IP-адрес получателя — может фиксироваться в логах для выявления аномалий, однако не сохраняется вместе с содержимым секрета.</li>
            </ul>
            <strong>При регистрации и использовании платных тарифов (Pro, Team):</strong>
            <ul>
              <li>Адрес электронной почты, имя (опционально).</li>
              <li>Данные платёжного средства — передаются напрямую платёжному шлюзу и не хранятся на наших серверах.</li>
              <li>История создания и открытия ссылок (идентификатор, дата, IP) — для аудита, предусмотренного тарифом.</li>
            </ul>
            <strong>Технические данные:</strong>
            <ul>
              <li>Cookies сессии, необходимые для работы Сервиса.</li>
              <li>Логи веб-сервера: URL, временная метка, HTTP-статус. Тело секрета в логи <strong>не записывается</strong>.</li>
            </ul>
        - heading: "3. Цели обработки"
          body: |
            Мы обрабатываем перечисленные данные исключительно для:
            <ul>
              <li>предоставления функциональности Сервиса (создание, хранение и удаление секретов);</li>
              <li>защиты от автоматического создания ссылок и подбора (rate-limiting по IP);</li>
              <li>соблюдения ограничений, предусмотренных тарифным планом;</li>
              <li>улучшения Сервиса на основе агрегированной обезличенной статистики.</li>
            </ul>
        - heading: "4. Правовые основания"
          body: |
            Для пользователей из РФ обработка осуществляется на основании:
            <ul>
              <li>согласия на обработку данных, которое вы даёте при использовании Сервиса (акцепт <a href="/terms">Условий использования</a>);</li>
              <li>законного интереса оператора в обеспечении безопасности Сервиса и предотвращении мошенничества.</li>
            </ul>
        - heading: "5. Хранение и сроки"
          body: |
            <ul>
              <li><strong>Секреты:</strong> удаляются из базы данных автоматически после исчерпания лимита просмотров или по истечении срока жизни (TTL). Максимальный срок жизни секрета — 7 календарных дней (на бесплатном тарифе — 24 часа).</li>
              <li><strong>IP-адреса:</strong> хранятся в логах системы защиты от атак не более 30 суток.</li>
              <li><strong>Учётные записи Pro:</strong> активны до тех пор, пока вы не запросите удаление аккаунта. Аккаунты, неактивные более 12 месяцев, могут быть удалены после предварительного уведомления.</li>
              <li><strong>Платёжная информация:</strong> мы не храним полные номера карт и банковские реквизиты. Токенизированные данные хранятся на стороне платёжного провайдера (<a href="https://yookassa.ru" target="_blank" rel="noopener">ЮKassa</a>) в соответствии с их политиками.</li>
            </ul>
        - heading: "6. Передача третьим лицам"
          body: |
            Мы <strong>никогда</strong> не передаём содержимое секретов третьим лицам.
            Данные могут быть доступны только:
            <ul>
              <li>нашему хостинг-провайдеру на территории РФ — исключительно в объёме, необходимом для размещения Сервиса;</li>
              <li>платёжному провайдеру (ЮKassa) — для обработки платежей по подписке.</li>
            </ul>
        - heading: "7. Безопасность данных"
          body: |
            Мы применяем шифрование данных в покое (AES-256-GCM), передачу по HTTPS, парольную защиту ссылок и автоматическое удаление. Подробное описание мер безопасности приведено на странице <a href="/security">Безопасность</a>.
        - heading: "8. Ваши права"
          body: |
            Вы имеете право:
            <ul>
              <li>запросить информацию о том, какие ваши данные у нас есть;</li>
              <li>потребовать удаления учётной записи и всех связанных с ней данных;</li>
              <li>отозвать согласие на обработку данных (это приведёт к прекращению использования платных функций).</li>
            </ul>
            Для секретов, созданных без регистрации, мы не можем идентифицировать отправителя — в таких случаях возможна только ручная блокировка конкретной ссылки по вашему обращению.
        - heading: "9. Изменения политики"
          body: |
            Мы оставляем за собой право вносить изменения в настоящую Политику. Пользователи с активной подпиской Pro будут уведомлены об изменениях по электронной почте. Актуальная версия всегда доступна по адресу <a href="/privacy">/privacy</a>.
