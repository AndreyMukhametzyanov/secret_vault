ru:
  pages:
    security:
      meta_title: "Безопасность — Секретница"
      title: "Безопасность"
      intro: |
        Мы проектировали «Секретницу» так, чтобы даже при компрометации сервера данные секретов оставались недоступны. Ниже — ключевые меры, которые мы применяем уже сегодня.
      checklist:
        - title: "Шифрование в покое"
          body: |
            Все секреты шифруются алгоритмом <strong>AES-256-GCM</strong> перед сохранением в базу данных. Ключи шифрования хранятся отдельно от БД и никогда не попадают в репозиторий или логи. Получение дампа базы не позволяет прочитать содержимое.
        - title: "Защита передачи (TLS)"
          body: |
            Весь трафик между клиентом и сервером защищён по протоколу HTTPS (TLS 1.3). Включён HSTS, предотвращающий понижение до HTTP.
        - title: "Непредсказуемые ссылки"
          body: |
            Каждая секретная ссылка содержит случайный идентификатор UUID v4. Подбор или перебор ссылок практически невозможен — пространство значений слишком велико.
        - title: "Однократное сгорание"
          body: |
            После заданного числа просмотров (по умолчанию — один) запись о секрете <strong>физически удаляется</strong> из базы данных. Используется пессимистичная блокировка строки в БД, чтобы исключить повторную выдачу при одновременных запросах.
        - title: "Кодовое слово"
          body: |
            В тарифе <strong>Pro</strong> на ссылку можно задать кодовое слово. Оно хранится в виде <strong>bcrypt-хэша</strong>. Неверный пароль не удаляет секрет; после лимита попыток доступ блокируется.
        - title: "Изоляция и логирование"
          body: |
            Мы логируем только факты создания/открытия ссылок (ID, время, IP) для технического аудита и защиты от атак. <strong>Содержимое секретов никогда не пишется в логи</strong> и не выводится в интерфейсах мониторинга.
        - title: "Лимиты и периметр"
          body: |
            <strong>Rack::Attack</strong>, дневные лимиты создания ссылок с IP (Redis), заголовки безопасности и Content-Security-Policy. В production — <strong>force_ssl</strong> (только HTTPS).
        - title: "Размещение в РФ"
          body: |
            Серверы Сервиса размещаются в дата-центрах на территории Российской Федерации. Доступ к production-окружению имеет ограниченный круг лиц с обязательной двухфакторной аутентификацией.
        - title: "Резервное копирование"
          body: |
            Все резервные копии также зашифрованы. Секреты с истёкшим сроком жизни не попадают в бэкапы — удаление происходит до создания очередного снимка.
      honest_notice:
        title: "Честное предупреждение"
        body: |
          Мы не являемся «zero-knowledge» сервисом в облачной версии: при открытии ссылки секрет расшифровывается на сервере, чтобы показать его получателю. Мы гарантируем, что расшифрованный текст не сохраняется и не логируется, однако для максимальной конфиденциальности предлагаем <strong>on-prem решение</strong> — Docker-контейнер, который запускается на вашей собственной инфраструктуре. В этом случае все ключи шифрования остаются у вас.
          <br><br>
          По вопросам on-prem: <a href="mailto:onprem@secretvault.ru">onprem@secretvault.ru</a>.
