    terms:
      meta_title: "Условия использования — Секретница"
      title: "Условия использования"
      last_updated: "26 июня 2026 г."
      sections:
        - heading: "1. Общие положения"
          body: |
            Настоящий документ является публичной офертой и определяет условия использования онлайн-сервиса «Секретница» (далее — Сервис). При создании секрета без регистрации фактическое использование Сервиса означает принятие условий в объёме, необходимом для оказания услуги. При <strong>регистрации аккаунта</strong> вы подтверждаете акцепт отдельными отметками в форме регистрации.
        - heading: "2. Предмет соглашения"
          body: |
            Сервис предоставляет пользователям возможность создавать защищённые одноразовые ссылки для передачи конфиденциальных данных. Мы обязуемся обеспечить шифрование, однократный показ и автоматическое удаление секретов в соответствии с выбранным тарифным планом.
        - heading: "3. Права и обязанности пользователя"
          body: |
            Пользователь обязуется:
            <ul>
              <li>не загружать в Сервис информацию, запрещённую законодательством РФ (вредоносное ПО, экстремистские материалы, персональные данные без законных оснований и т.п.);</li>
              <li>не использовать автоматизированные средства для массового создания ссылок без подключения официального API;</li>
              <li>не предпринимать попыток обратной инженерии, взлома или иного вмешательства в работу Сервиса.</li>
            </ul>
        - heading: "4. Права и обязанности Сервиса"
          body: |
            Сервис обязуется:
            <ul>
              <li>поддерживать работоспособность на разумном уровне (99% uptime не гарантируется на бесплатном тарифе);</li>
              <li>обеспечивать шифрование данных в соответствии со страницей <a href="/security">Безопасность</a>;</li>
              <li>удалять секреты в заданные сроки без возможности восстановления.</li>
            </ul>
            Сервис имеет право:
            <ul>
              <li>временно приостанавливать работу для технического обслуживания;</li>
              <li>блокировать доступ пользователям, нарушающим настоящие Условия;</li>
              <li>изменять функциональность и тарифные планы с уведомлением зарегистрированных пользователей.</li>
            </ul>
        - heading: "5. Ограничение ответственности (важно)"
          body: |
            <strong>Сервис предоставляется «как есть» (as is).</strong> Мы не даём гарантий абсолютной безопасности, выходящих за рамки описанных на странице <a href="/security">Безопасность</a>.
            <br><br>
            В частности:
            <ul>
              <li>Сервис не несёт ответственности за перехват ссылки третьими лицами до того, как её открыл адресат.</li>
              <li>Расшифровка секрета происходит на стороне сервера в момент открытия ссылки. Мы принимаем все технические меры, чтобы расшифрованный текст не сохранялся на диск и не попадал в логи, однако не можем гарантировать защиту от целенаправленной атаки на серверное окружение.</li>
              <li>Мы не проверяем содержимое секретов и не можем знать, передаёте ли вы через Сервис персональные данные или иную чувствительную информацию. Вся ответственность за классификацию передаваемых данных лежит на пользователе.</li>
            </ul>
            Совокупная материальная ответственность Сервиса по любым претензиям ограничена:
            <ul>
              <li>для бесплатного тарифа — 0 (ноль) рублей;</li>
              <li>для платных тарифов — суммой последнего ежемесячного платежа, уплаченного пользователем.</li>
            </ul>
        - heading: "6. Платные услуги (Pro, Team)"
          body: |
            Подписка оформляется через платёжную систему ЮKassa. Перед переходом к оплате вы подтверждаете согласие с условиями тарифа Pro, автоплатежами и передачей данных платёжному партнёру отдельными отметками в форме. Списание средств происходит автоматически в начале каждого расчётного периода.
            <br><br>
            Отмена подписки возможна в личном кабинете в любой момент. При отмене платные функции сохраняются до конца оплаченного периода, после чего тариф переводится на бесплатный.
            <br><br>
            Возврат средств за уже оплаченный период не производится, за исключением случаев, когда невозможность оказания услуги возникла по вине Сервиса и подтверждена обеими сторонами.
        - heading: "7. Персональные данные"
          body: |
            Обработка персональных данных регулируется <a href="/privacy">Политикой конфиденциальности</a>. Используя Сервис, вы даёте согласие на обработку ваших данных в объёме, описанном в указанном документе.
        - heading: "8. Заключительные положения"
          body: |
            К отношениям применяется законодательство Российской Федерации. Все споры разрешаются путём переговоров; при недостижении согласия — в судебном порядке по месту нахождения оператора Сервиса.
            <br><br>
            Мы оставляем за собой право вносить изменения в настоящие Условия. Новая редакция вступает в силу с момента публикации на данной странице.
        - heading: "9. Контакты"
          body: |
            По всем вопросам, связанным с использованием Сервиса, пишите на <a href="mailto:support@secretvault.ru">support@secretvault.ru</a>.
