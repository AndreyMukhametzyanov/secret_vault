en:
  layouts:
    application:
      title: "Secret Vault | Secure secret sharing"
      brand: "Secret Vault"

  secrets:
    new:
      title: "Create a one-time link"
      lead: "Data is encrypted in the database and removed after the first view."
      body_label: "Your secret (password, token, text)"
      body_placeholder: "Paste confidential data here..."
