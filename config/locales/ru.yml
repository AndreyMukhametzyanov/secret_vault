        security: "Безопасность"

  pages:
    shared:
      back_home: "На главную"
      breadcrumb_home: "Главная"
      breadcrumb_aria_label: "Хлебные крошки"
      operator_notice: |
        <strong>Важно:</strong> «Секретница» — не end-to-end сервис. В момент открытия ссылки секрет <strong>расшифровывается на сервере</strong>, чтобы показать его получателю. Расшифрованный текст <strong>не сохраняем</strong> в базе и <strong>не пишем</strong> в логи приложения (см. <a href="/security">Безопасность</a>). Доступ оператора к инфраструктуре теоретически возможен — для критичных данных рассмотрите кодовое слово и on-prem.

    home:
      meta_title: "Секретница — секрет который живёт мгновение"
      title: "Передайте пароль или токен одной ссылкой"
      lead: "Текст шифруется в базе и удаляется после просмотра. Без регистрации — начните за минуту."
      cta_primary: "Создать секрет"
      cta_security: "Как мы защищаем данные"
      steps:
        title: "Как это работает"
        step_1:
          icon: "1️⃣"
          title: "Вставьте секрет"
          body: "Текст, пароль или ключ — до 8 КБ. Опционально кодовое слово для получателя."
        step_2:
          icon: "2️⃣"
          title: "Отправьте ссылку"
          body: "Уникальный UUID вместо угадываемого ID. Срок жизни и число просмотров настраиваются."
        step_3:
          icon: "3️⃣"
          title: "Секрет сгорает"
          body: "После лимита просмотров или истечения срока данные удаляются из базы."
      plans:
        title: "Тарифы"
        feature: "Возможность"
        free: "Бесплатно"
        pro: "Pro"
        pro_note: "Подписка Pro — в следующих релизах. Сейчас доступен бесплатный тариф."
        rows:
          ttl:
            label: "Срок жизни ссылки"
            free: "24 часа"
            pro: "1 ч — 7 дней"
          reads:
            label: "Просмотров"
            free: "1"
            pro: "до 5"
          passphrase:
            label: "Кодовое слово"
            free: "✓"
            pro: "✓"
          notify:
            label: "Уведомление об открытии"
            free: "—"
            pro: "Email"
      faq:
        title: "Безопасность: частые вопросы"
        lead: "Кратко о шифровании, одноразовых ссылках и ваших рисках. Подробности — на странице «Безопасность»."
        items:
          - question: "Видите ли вы мой секрет?"
            answer: |
              Текст расшифровывается на сервере только в момент просмотра получателем. Мы не пишем тело секрета в логи. Подробнее — <a href="/security">Безопасность</a>.
          - question: "Можно ли открыть ссылку дважды?"
            answer: |
              На бесплатном тарифе — один просмотр, затем запись удаляется. В Pro можно задать до нескольких просмотров до удаления.
          - question: "Что если ссылку перехватят?"
            answer: |
              Используйте кодовое слово отдельно от ссылки. Идентификатор — случайный UUID; перебор ограничен лимитами запросов (Rack::Attack, дневные лимиты создания).
          - question: "Где хранятся данные и как долго?"
            answer: |
              Секрет шифруется в базе (AES-256-GCM) до удаления по TTL или лимиту просмотров. На Free срок жизни ссылки — 24 часа. Юридические детали — в <a href="/privacy">Политике конфиденциальности</a>.
          - question: "Нужна ли регистрация?"
            answer: |
              Нет. Создавать секреты можно как гость с главной страницы. Аккаунт понадобится для Pro, уведомлений об открытии и расширенных лимитов.

